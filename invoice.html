.inv-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:34px}
.inv-brand{font-family:Newsreader,serif;font-size:22px;letter-spacing:2px;color:var(--gold-deep)}

.inv-meta{text-align:right;font-family:Inter,sans-serif;font-size:12px;color:var(--ink-soft);line-height:1.7}
.inv-meta strong{color:var(--ink)}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:30px}
@media(max-width:600px){.inv-parties{grid-template-columns:1fr}}
.inv-parties h5{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:8px}
.inv-parties div{font-family:Inter,sans-serif;font-size:13px;line-height:1.7;color:var(--ink)}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.inv-table th{font-family:Inter,sans-serif;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft);text-align:left;padding:0 0 10px;border-bottom:1px solid rgba(26,22,18,0.16)}
.inv-table td{font-family:Inter,sans-serif;font-size:14px;color:var(--ink);padding:11px 0;border-bottom:1px solid rgba(26,22,18,0.06)}
.inv-table td.num,.inv-table th.num{text-align:right;font-variant-numeric:tabular-nums}
.inv-tot{width:100%;max-width:280px;margin-left:auto}
.inv-tot tr td{font-family:Inter,sans-serif;font-size:13px;color:var(--ink-soft);padding:5px 0}
.inv-tot tr td.num{text-align:right;color:var(--ink);font-variant-numeric:tabular-nums}
.inv-tot tr.grand td{font-family:Newsreader,serif;font-size:18px;color:var(--ink);border-top:1px solid rgba(26,22,18,0.16);padding-top:12px}
.inv-foot{margin-top:30px;font-family:Inter,sans-serif;font-size:11px;color:var(--ink-soft);line-height:1.7;text-align:center}

<script>
(function(){
  function money(n){n=Math.round((n||0)*100)/100;return '€'+n.toFixed(2);}
  var id=new URLSearchParams(location.search).get('order');
  var orders=[];try{orders=JSON.parse(localStorage.getItem('hd-orders-v1')||'[]');}catch(e){}
  var o=null;for(var i=0;i<orders.length;i++){if(orders[i].id===id){o=orders[i];break;}}if(!o)o=orders[0];
  var sheet=document.getElementById('invSheet');
  if(!o){sheet.innerHTML='<p style="font-family:Inter,sans-serif;color:var(--ink-soft)">No invoice found. <a href="account-orders.html" style="color:var(--gold-deep)">Back to orders →</a></p>';return;}
  var c=o.customer||{};var addr=(c.billing||{});
  var VAT=0.09; // NL reduced rate on foods
  var gross=o.total||0; var net=gross/(1+VAT); var vat=gross-net;
  var rows=(o.items||[]).map(function(it){var line=it.price*it.qty;return '<tr><td>'+it.name+(it.weight?' · '+it.weight:'')+'</td><td class="num">'+it.qty+'</td><td class="num">'+money(it.price)+'</td><td class="num">'+money(line)+'</td></tr>';}).join('');
  var d=new Date(o.createdAt);
  sheet.innerHTML=''+
  '<div class="inv-top"><div class="inv-brand">HARVEST DELI<small>Premium Greek products</small></div>'+
    '<div class="inv-meta"><strong>Invoice</strong><br>'+o.id+'<br>'+d.toLocaleDateString()+'</div></div>'+
  '<div class="inv-parties">'+
    '<div><h5>From</h5><div>Harvest Deli B.V.<br>Ten Katestraat, Amsterdam<br>Netherlands<br>KvK [00000000] · BTW NL[000000000]B01</div></div>'+
    '<div><h5>Billed to</h5><div>'+((c.firstName||'')+' '+(c.lastName||'')).trim()+(c.company?'<br>'+c.company:'')+'<br>'+[addr.line1,addr.line2].filter(Boolean).join('<br>')+'<br>'+((addr.postcode||'')+' '+(addr.city||'')).trim()+'<br>'+(addr.country||'')+(c.vat?'<br>VAT: '+c.vat:'')+'</div></div>'+
  '</div>'+
  '<table class="inv-table"><thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Unit</th><th class="num">Amount</th></tr></thead><tbody>'+rows+'</tbody></table>'+
  '<table class="inv-tot"><tr><td>Subtotal (excl. VAT)</td><td class="num">'+money(net)+'</td></tr>'+
    (o.discount>0?'<tr><td>Discount</td><td class="num">−'+money(o.discount)+'</td></tr>':'')+
    '<tr><td>Shipping</td><td class="num">'+(o.shipping?money(o.shipping):'Free')+'</td></tr>'+
    '<tr><td>VAT 9%</td><td class="num">'+money(vat)+'</td></tr>'+
    '<tr class="grand"><td>Total</td><td class="num">'+money(gross)+'</td></tr></table>'+
  '<div class="inv-foot">Paid via '+(o.paymentLabel||'—')+' · Thank you for supporting a small Greek estate.<br>This is a VAT invoice. SEAM: in production a signed PDF is generated server-side and archived for accounting.</div>';
  document.title='Invoice '+o.id+' · Harvest Deli';
})();
</script>
