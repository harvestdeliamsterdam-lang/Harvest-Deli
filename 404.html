<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 · Our bee got lost · Harvest Deli</title>
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#0E0B08">
<link rel="icon" href="favicon.svg?v=hd-2026-06-06-81" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ivory: #F8F4EB;
    --gold: #B8924F;
    --gold-bright: #E6C77E;
    --charcoal: #0E0B08;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  html, body { height: 100%; }
  body {
    min-height: 100dvh;
    background: radial-gradient(120% 90% at 60% 30%, #1A1B12 0%, #0E0B08 70%);
    color: var(--ivory);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- Cinematic fullscreen video ---------- */
  .e404__video {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
    background: #0E0B08;
  }
  /* Subtle dark overlay + vignette so text stays legible */
  .e404__overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(10, 10, 10, 0.18), rgba(10, 10, 10, 0.42)),
      radial-gradient(125% 95% at 50% 58%, transparent 38%, rgba(10, 10, 10, 0.5) 100%);
  }
  /* desktop cursor gold glow */
  .e404__cursor {
    position: fixed; top: 0; left: 0; width: 360px; height: 360px; z-index: 2;
    pointer-events: none; border-radius: 50%; transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(212, 184, 120, 0.10), transparent 62%);
    opacity: 0; transition: opacity 0.7s ease; will-change: transform;
  }
  @media (hover: hover) and (pointer: fine) { body.has-cursor .e404__cursor { opacity: 1; } }

  /* ---------- Animated gold viewport border (12s clockwise) ---------- */
  .e404__frame { position: fixed; inset: 0; z-index: 6; pointer-events: none; }
  .e404__frame rect { fill: none; }
  .e404__frame .base { stroke: rgba(184, 146, 79, 0.5); stroke-width: 1; }
  .e404__frame .travel {
    stroke: rgba(230, 199, 126, 0.95); stroke-width: 1.4; stroke-linecap: round;
    filter: drop-shadow(0 0 5px rgba(212, 184, 120, 0.55));
    animation: e404frame 12s linear infinite;
  }
  @keyframes e404frame { to { stroke-dashoffset: calc(-1 * var(--peri, 2400px)); } }

  /* ---------- Tiny bee, top-right, flaps softly every 8s ---------- */
  .e404__bee {
    position: fixed; z-index: 7;
    top: calc(22px + env(safe-area-inset-top)); right: calc(24px + env(safe-area-inset-right));
    width: 34px; height: 31px; opacity: 0.85;
  }
  .e404__bee .wing { transform-origin: 20px 13px; animation: e404wing 8s ease-in-out infinite; }
  .e404__bee .wing--r { animation-name: e404wingR; }
  @keyframes e404wing  { 0%, 84%, 100% { transform: scaleY(1) rotate(0); } 88% { transform: scaleY(0.55) rotate(-7deg); } 92% { transform: scaleY(1) rotate(0); } 96% { transform: scaleY(0.6) rotate(-5deg); } 99% { transform: scaleY(1); } }
  @keyframes e404wingR { 0%, 84%, 100% { transform: scaleY(1) rotate(0); } 88% { transform: scaleY(0.55) rotate(7deg); } 92% { transform: scaleY(1) rotate(0); } 96% { transform: scaleY(0.6) rotate(5deg); } 99% { transform: scaleY(1); } }

  /* small brand anchor, top-left */
  .e404__brand {
    position: fixed; z-index: 7;
    top: calc(24px + env(safe-area-inset-top)); left: calc(26px + env(safe-area-inset-left));
    font-family: 'Inter Tight', sans-serif; font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
    font-weight: 600; color: rgba(248, 244, 235, 0.7); text-decoration: none;
    transition: color 0.4s var(--ease);
  }
  .e404__brand:hover { color: var(--gold-bright); }

  /* ---------- Content ---------- */
  .e404__content {
    position: relative; z-index: 3;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: calc(40px + env(safe-area-inset-top)) 24px calc(40px + env(safe-area-inset-bottom));
  }
  .e404__reveal { opacity: 0; transform: translateY(20px); transition: opacity 1.1s var(--ease), transform 1.1s var(--ease); }
  body.e404-revealed .e404__reveal { opacity: 1; transform: none; }
  body.e404-revealed .e404__num   { transition-delay: 0s; }
  body.e404-revealed .e404__title { transition-delay: 0.12s; }
  body.e404-revealed .e404__sub   { transition-delay: 0.24s; }
  body.e404-revealed .e404__cta   { transition-delay: 0.38s; }

  .e404__num {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-weight: 500; font-size: clamp(108px, 23vw, 270px); line-height: 0.86;
    letter-spacing: -0.02em; color: var(--ivory);
    text-shadow: 0 10px 60px rgba(0, 0, 0, 0.45);
  }
  .e404__title {
    font-family: 'Inter Tight', sans-serif; font-weight: 500;
    font-size: clamp(23px, 4vw, 40px); letter-spacing: -0.022em; line-height: 1.1;
    color: var(--ivory); margin-top: clamp(34px, 6vh, 64px); text-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
  }
  .e404__sub {
    font-family: 'Inter Tight', sans-serif; font-weight: 400;
    font-size: clamp(14px, 1.6vw, 17px); line-height: 1.6;
    color: rgba(248, 244, 235, 0.74); margin-top: 14px; max-width: 42ch;
    text-shadow: 0 2px 18px rgba(0, 0, 0, 0.4);
  }

  /* ---------- Liquid-gold CTA ---------- */
  .e404__cta {
    position: relative; display: inline-flex; align-items: center; gap: 14px;
    margin-top: 38px; padding: 17px 40px; border-radius: 999px; overflow: hidden;
    background: rgba(14, 11, 8, 0.42);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    border: 1px solid var(--gold); color: var(--ivory); text-decoration: none;
    font-family: 'Inter Tight', sans-serif; font-size: 11px; letter-spacing: 0.24em;
    text-transform: uppercase; font-weight: 600; min-height: 54px;
    box-shadow: 0 14px 36px -20px rgba(0, 0, 0, 0.6);
    transition: color 0.5s var(--ease), border-color 0.5s var(--ease), box-shadow 0.5s var(--ease), transform 0.5s var(--ease);
  }
  .e404__cta > * { position: relative; z-index: 2; }
  /* moving liquid gold fill, revealed on hover */
  .e404__cta::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(110deg, #8A6228 0%, #E6C77E 28%, #C99A4A 48%, #F3D98A 68%, #9A6F2E 100%);
    background-size: 250% 100%; background-position: 100% 0;
    opacity: 0; transition: opacity 0.5s var(--ease);
    animation: e404liquid 3.5s linear infinite;
  }
  @keyframes e404liquid { to { background-position: -150% 0; } }
  .e404__cta:hover, .e404__cta:focus-visible {
    color: #20160A; border-color: var(--gold-bright); transform: translateY(-2px);
    box-shadow: 0 22px 48px -18px rgba(184, 146, 79, 0.6);
  }
  .e404__cta:hover::before, .e404__cta:focus-visible::before { opacity: 1; }
  .e404__cta:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 4px; }
  .e404__cta .arrow { width: 22px; height: 1px; background: currentColor; position: relative; transition: width 0.4s var(--ease); }
  .e404__cta .arrow::after { content: ''; position: absolute; right: 0; top: -3px; width: 7px; height: 7px; border-right: 1px solid currentColor; border-top: 1px solid currentColor; transform: rotate(45deg); }
  .e404__cta:hover .arrow { width: 30px; }

  /* smooth page-leave transition */
  body { transition: opacity 0.5s ease; }
  body.e404-leaving { opacity: 0; }

  @media (max-width: 600px) {
    .e404__num { font-size: clamp(92px, 32vw, 150px); }
    .e404__cta { padding: 16px 32px; }
    .e404__brand { font-size: 9px; letter-spacing: 0.36em; }
  }
  @media (prefers-reduced-motion: reduce) {
    .e404__reveal { transition: none; opacity: 1; transform: none; }
    .e404__frame .travel, .e404__bee .wing, .e404__cta::before { animation: none; }
  }
</style>
</head>
<body>

<video class="e404__video" autoplay muted loop playsinline webkit-playsinline preload="auto" aria-hidden="true">
  <source src="404.mp4?v=hd-2026-06-06-81" type="video/mp4">
</video>
<div class="e404__overlay" aria-hidden="true"></div>
<div class="e404__cursor" aria-hidden="true"></div>

<svg class="e404__frame" preserveAspectRatio="none" aria-hidden="true"><rect class="base"/><rect class="travel"/></svg>

<a class="e404__brand" href="/">Harvest Deli</a>

<span class="e404__bee" aria-hidden="true">
  <svg viewBox="0 0 40 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse class="wing wing--l" cx="14.5" cy="13" rx="6" ry="9" fill="rgba(230,199,126,0.28)" stroke="#B8924F" stroke-width="0.8"/>
    <ellipse class="wing wing--r" cx="25.5" cy="13" rx="6" ry="9" fill="rgba(230,199,126,0.28)" stroke="#B8924F" stroke-width="0.8"/>
    <ellipse cx="20" cy="23" rx="6.6" ry="10.2" fill="#8A6228"/>
    <path d="M14 19 H26 M14.4 25 H25.6 M16.2 31 H23.8" stroke="#F8F4EB" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="20" cy="12.6" r="3.3" fill="#1F1A14"/>
    <path d="M18 9 C16 5 14 4.4 13 5 M22 9 C24 5 26 4.4 27 5" stroke="#1F1A14" stroke-width="0.9" stroke-linecap="round"/>
  </svg>
</span>

<main class="e404__content">
  <div class="e404__num e404__reveal">404</div>
  <h1 class="e404__title e404__reveal">Our bee got lost.</h1>
  <p class="e404__sub e404__reveal">The path you followed seems to lead somewhere else.</p>
  <a href="/" class="e404__cta e404__reveal" data-home>
    <span>Return to Harvest</span>
    <span class="arrow" aria-hidden="true"></span>
  </a>
</main>

<script>
(function () {
  'use strict';
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var body = document.body;

  /* Cinematic timeline: 0–4s only video, then the text rises in.
     Any interaction reveals early so we never trap the visitor. */
  var revealed = false;
  function reveal() { if (revealed) return; revealed = true; body.classList.add('e404-revealed'); }
  if (reduce) { reveal(); }
  else {
    setTimeout(reveal, 4000);
    ['pointerdown', 'keydown', 'wheel', 'touchstart'].forEach(function (ev) {
      window.addEventListener(ev, reveal, { once: true, passive: true });
    });
  }

  /* Ensure the muted video actually plays (some browsers need a nudge) */
  var vid = document.querySelector('.e404__video');
  if (vid) { var p = vid.play(); if (p && p.catch) p.catch(function () {}); }

  /* Animated gold viewport border — uniform clockwise travel, resize-aware */
  var frame = document.querySelector('.e404__frame');
  var base = frame.querySelector('.base'), travel = frame.querySelector('.travel');
  function sizeFrame() {
    var w = window.innerWidth, h = window.innerHeight, i = 1;
    frame.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
    frame.setAttribute('width', w); frame.setAttribute('height', h);
    [base, travel].forEach(function (r) {
      r.setAttribute('x', i); r.setAttribute('y', i);
      r.setAttribute('width', w - i * 2); r.setAttribute('height', h - i * 2);
    });
    var peri = 2 * ((w - i * 2) + (h - i * 2));
    var dash = Math.max(120, peri * 0.06);
    travel.setAttribute('stroke-dasharray', dash + ' ' + (peri - dash));
    travel.style.setProperty('--peri', peri + 'px');
  }
  sizeFrame();
  window.addEventListener('resize', sizeFrame, { passive: true });

  /* Subtle gold glow follows the cursor (desktop only) */
  if (!reduce && window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
    var glow = document.querySelector('.e404__cursor');
    var gx = window.innerWidth / 2, gy = window.innerHeight / 2, tx = gx, ty = gy, ticking = false;
    window.addEventListener('mousemove', function (e) {
      tx = e.clientX; ty = e.clientY;
      body.classList.add('has-cursor');
      if (!ticking) { ticking = true; requestAnimationFrame(follow); }
    }, { passive: true });
    function follow() {
      gx += (tx - gx) * 0.16; gy += (ty - gy) * 0.16;
      glow.style.transform = 'translate(' + gx + 'px,' + gy + 'px) translate(-50%,-50%)';
      if (Math.abs(tx - gx) > 0.5 || Math.abs(ty - gy) > 0.5) requestAnimationFrame(follow);
      else ticking = false;
    }
  }

  /* Smooth fade-out before navigating home; Escape also returns home */
  function goHome(e) { if (e) e.preventDefault(); body.classList.add('e404-leaving'); setTimeout(function () { window.location.href = '/'; }, reduce ? 0 : 480); }
  document.querySelectorAll('[data-home], .e404__brand').forEach(function (a) {
    a.addEventListener('click', goHome);
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') goHome(e); });
})();
</script>
</body>
</html>
